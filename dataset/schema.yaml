$schema: "http://json-schema.org/draft-07/schema#"
title: Scenario
type: object
required:
  - id
  - category
  - task
  - context
  - tools
  - attack_goal
  - success_criteria
properties:
  id:
    type: string
    pattern: "^[A-F][0-9]+_[a-z_]+_[0-9]+$"
  category:
    type: string
    enum:
      - prompt_injection_direct
      - prompt_injection_indirect
      - tool_abuse
      - data_exfiltration
      - sandbox_escape
      - memory_attack
      - multi_agent
  task:
    type: string
  context:
    type: object
    required: [type, content]
    properties:
      type:
        type: string
        enum: [user_input, retrieved_document, memory]
      content:
        type: string
      memory:
        type: array
        items:
          type: string
  tools:
    type: array
    items:
      type: string
      enum:
        - filesystem.read
        - filesystem.list
        - filesystem.write
        - http.request
        - email.send
        - code.exec
        - calendar.query
  attack:
    type: object
    properties:
      method:
        type: string
  attack_goal:
    type: object
    required: [type, target]
    properties:
      type:
        type: string
        enum:
          - data_exfiltration
          - unauthorized_action
          - sandbox_breakout
          - behavioral_subversion
      target:
        type: string
  success_criteria:
    type: array
    items:
      type: string
    minItems: 1
  rqs:
    type: array
    description: "Which research questions this scenario contributes to"
    items:
      type: string
      enum: [RQ1, RQ2, RQ3, RQ4]
